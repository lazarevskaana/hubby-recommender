services:
  postgres:
    image: postgres:16
    container_name: hubby_postgres
    environment:
      POSTGRES_USER: hubby
      POSTGRES_PASSWORD: hubby_dev_password
      POSTGRES_DB: hubby_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
